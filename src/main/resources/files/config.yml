# =============================================
# McBank Plugin Configuration
# =============================================
# Plugin: McBank
# Version: 2.2
# Author: Chkaduuu
# =============================================

plugin:
  name: McBank
  version: 2.2
  author: Chkaduuu
  prefix: "&6[&eMcBank&6]&r"

# Language setting
# Available: en (English), ru (Russian), ge (Georgian)
language: "en"

# Bank upgrade settings
max-bank-level: 3

# Income distribution interval
# Format: 5m (5 minutes), 1h (1 hour), 30s (30 seconds)
bank-income-time: "5m"

# Bank settings
bank:
  max_accounts_per_player: 1
  starting_balance: 0.0
  min_deposit: 1.0
  min_withdraw: 1.0
  min_transfer: 1.0
  currency_symbol: "$"
  currency_name: "Coin"
  currency_name_plural: "Coins"

# Loan (credit) settings
loan:
  enabled: true
  interest_percent: 5
  default_loan_limit: 10000

# Account number formats
account_formats:
  - "GE87BG0000000"
  - "GE98TB0000000"

# Vault integration
vault:
  enabled: true

# EssentialsX integration
essentialsx:
  enabled: true

# CMI integration
cmi:
  enabled: true

# PlaceholderAPI integration
placeholderapi:
  enabled: true

# ATM settings
atm:
  hologram_text: "&6&lBank ATM"
  hologram_height: 1.5
  pin_required: true

# Debug mode
debug: false
